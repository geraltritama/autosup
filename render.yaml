services:
  - type: web
    name: autosup-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: AI_MODEL
        value: google/gemma-2-9b-it:free
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: SOLANA_AUTHORITY_KEYPAIR
        sync: false
      - key: XENDIT_SECRET_KEY
        sync: false
      - key: XENDIT_WEBHOOK_TOKEN
        sync: false
      - key: XENDIT_CALLBACK_BASE_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
    healthCheckPath: /
